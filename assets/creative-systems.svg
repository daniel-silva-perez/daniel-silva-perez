<svg width="1400" height="250" viewBox="0 0 1400 250" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Creative Systems Portfolio Line</title>
  <desc id="desc">Horizontal neon panel showing four featured interactive browser projects: benchmark-lms-subagent, morphix, echo-chamber, and neon-flock.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050816"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="stroke" x1="72" y1="74" x2="1328" y2="186" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="260" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2E1065" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#0F172A" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="260" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#082F49" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="260" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3F0D2E" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="260" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#083344" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#111827" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect x="10" y="10" width="1380" height="230" rx="28" fill="url(#bg)"/>
  <rect x="10" y="10" width="1380" height="230" rx="28" stroke="#FFFFFF" stroke-opacity="0.1"/>
  <rect x="54" y="42" width="214" height="28" rx="14" fill="#0F172A" stroke="#8B5CF6" stroke-opacity="0.45"/>
  <text x="76" y="60" fill="#E9D5FF" font-size="13" letter-spacing="1.8" font-family="'SFMono-Regular', Consolas, monospace">CREATIVE SYSTEMS LINE</text>
  <text x="54" y="98" fill="#F8FAFC" font-size="30" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">Interactive browser work with real aesthetic intent</text>
  <rect x="54" y="116" width="1292" height="2" rx="1" fill="url(#stroke)" fill-opacity="0.95"/>

  <g transform="translate(54 138)">
    <rect width="302" height="74" rx="20" fill="url(#card1)" stroke="#C084FC" stroke-opacity="0.24"/>
    <text x="18" y="28" fill="#F8FAFC" font-size="18" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">benchmark-lms-subagent</text>
    <text x="18" y="51" fill="#D8B4FE" font-size="14" font-family="'Segoe UI', Arial, sans-serif">WebGL ASCII fluid simulation</text>
  </g>

  <g transform="translate(378 138)">
    <rect width="302" height="74" rx="20" fill="url(#card2)" stroke="#67E8F9" stroke-opacity="0.24"/>
    <text x="18" y="28" fill="#F8FAFC" font-size="18" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">morphix</text>
    <text x="18" y="51" fill="#A5F3FC" font-size="14" font-family="'Segoe UI', Arial, sans-serif">Live GLSL playground + shareable presets</text>
  </g>

  <g transform="translate(702 138)">
    <rect width="302" height="74" rx="20" fill="url(#card3)" stroke="#F9A8D4" stroke-opacity="0.24"/>
    <text x="18" y="28" fill="#F8FAFC" font-size="18" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">echo-chamber</text>
    <text x="18" y="51" fill="#FBCFE8" font-size="14" font-family="'Segoe UI', Arial, sans-serif">Spatial audio memory palace</text>
  </g>

  <g transform="translate(1026 138)">
    <rect width="302" height="74" rx="20" fill="url(#card4)" stroke="#22D3EE" stroke-opacity="0.24"/>
    <text x="18" y="28" fill="#F8FAFC" font-size="18" font-weight="700" font-family="'Segoe UI', Arial, sans-serif">neon-flock</text>
    <text x="18" y="51" fill="#CFFAFE" font-size="14" font-family="'Segoe UI', Arial, sans-serif">Emergent boids + motion design</text>
  </g>
</svg>
